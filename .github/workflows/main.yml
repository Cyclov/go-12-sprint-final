name: Go
on:
  push:
    branches: [ "main" ]
  pull_request:
     branches: [ "main" ] 
jobs:   
 main-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-go@v6.4.0
      with: go-version-file: 'go.mod' 
    - name: Test
      run: go test -v ./... 
    
    - name: Vet
      run: go vet ./... 
